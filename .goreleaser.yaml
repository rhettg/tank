version: 2

project_name: tank

builds:
  - main: ./cmd/tank
    binary: tank
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - share/layers/**/*

nfpms:
  - package_name: tank
    vendor: rhettg
    maintainer: Rhett Garber
    description: Tank - deterministic VM images and disposable machines for libvirt
    license: MIT
    formats:
      - deb
      - rpm
    dependencies:
      - libvirt
      - genisoimage
    scripts:
      postinstall: scripts/postinstall.sh
    contents:
      - src: share/layers/
        dst: /usr/share/tank/layers/
        type: tree
    overrides:
      deb:
        dependencies:
          - libvirt-daemon-system
          - qemu-system-x86
          - libguestfs-tools
          - genisoimage
          - virtinst
      rpm:
        dependencies:
          - libvirt
          - qemu-kvm
          - guestfs-tools
          - genisoimage
          - virt-install

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  github:
    owner: rhettg
    name: tank
