name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  arch:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Build Arch package
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG_VERSION#v}"

          mkdir -p dist/arch

          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            -e "VERSION=${version}" \
            archlinux:latest \
            bash -lc '
              set -euo pipefail
              pacman -Syu --noconfirm base-devel go git curl

              build_dir="/tmp/arch-build"
              mkdir -p "${build_dir}"
              cp /workspace/scripts/arch/PKGBUILD /workspace/scripts/arch/tank.install "${build_dir}/"
              sed -i "s/^pkgver=.*/pkgver=${VERSION}/" "${build_dir}/PKGBUILD"

              cd "${build_dir}"
              makepkg --noconfirm --syncdeps --cleanbuild --clean --needed --skippgpcheck --nosign

              cp *.pkg.tar.zst /workspace/dist/arch/
            '

          sha256sum dist/arch/*.pkg.tar.zst > dist/arch/checksums.txt

      - name: Upload Arch package to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" dist/arch/*.pkg.tar.zst dist/arch/checksums.txt --clobber
