name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_VERSION: ${{ github.ref_name }}

  arch:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Build Arch package
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG_VERSION#v}"
          version="${version##*/}"
          version="$(echo "${version}" | tr -cd '0-9.')"
          if [ -z "${version}" ]; then
            echo "Invalid tag version: ${TAG_VERSION}" >&2
            exit 1
          fi

          mkdir -p dist/arch
          git archive --format=tar.gz --prefix="tank-${version}/" "${TAG_VERSION}" > "dist/arch/tank-${version}.tar.gz"

          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            -e "VERSION=${version}" \
            archlinux:latest \
            bash -lc '
              set -euo pipefail
              pacman-key --init
              pacman-key --populate archlinux
              pacman -Syu --noconfirm archlinux-keyring
              pacman -Syu --noconfirm base-devel go git curl

              useradd -m builder
              build_dir="/tmp/arch-build"
              mkdir -p "${build_dir}"
              cp "/workspace/dist/arch/tank-${VERSION}.tar.gz" "${build_dir}/"
              cp /workspace/scripts/arch/PKGBUILD /workspace/scripts/arch/tank.install "${build_dir}/"
              sed -i "s/^pkgver=.*/pkgver=${VERSION}/" "${build_dir}/PKGBUILD"
              perl -0777 -pi -e "s/source=\([^)]*\)/source=(\"tank-${VERSION}.tar.gz\" \"tank.install\")/s" "${build_dir}/PKGBUILD"
              perl -0777 -pi -e "s/sha256sums=\([^)]*\)/sha256sums=('SKIP' 'SKIP')/s" "${build_dir}/PKGBUILD"
              chown -R builder:builder "${build_dir}"

              cd "${build_dir}"
              sudo -u builder makepkg --noconfirm --cleanbuild --clean --needed --skippgpcheck --nosign --nodeps

              cp *.pkg.tar.zst /workspace/dist/arch/
            '

          sha256sum dist/arch/*.pkg.tar.zst > dist/arch/checksums.txt

      - name: Upload Arch package to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" dist/arch/*.pkg.tar.zst dist/arch/checksums.txt --clobber
